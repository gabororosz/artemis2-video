<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1920px; height: 1080px; overflow: hidden; background: transparent; }
    </style>
  </head>
  <body>
    <div
      id="scene-7-root"
      data-composition-id="scene-7"
      data-start="0"
      data-duration="60"
      data-width="1920"
      data-height="1080"
      style="width:1920px;height:1080px;position:relative;overflow:hidden;background:transparent;font-family:'Space Grotesk',sans-serif;color:#E8EEF7;"
    >
      <div id="s7-content" style="position:absolute;inset:0;opacity:0;background:#05070D;">
        <div style="position:absolute;inset:0;background:
          radial-gradient(ellipse 80% 60% at 50% 100%, rgba(255,107,53,0.22) 0%, rgba(255,107,53,0) 55%),
          radial-gradient(ellipse 100% 70% at 50% 115%, rgba(255,209,102,0.18) 0%, rgba(255,209,102,0) 50%);"></div>

        <div id="s7-stars" style="position:absolute;inset:0;background:
          radial-gradient(circle at 18% 24%, #E8EEF7 0.6px, rgba(232,238,247,0) 1.0px),
          radial-gradient(circle at 78% 14%, #E8EEF7 0.5px, rgba(232,238,247,0) 0.9px),
          radial-gradient(circle at 58% 36%, #E8EEF7 0.5px, rgba(232,238,247,0) 0.9px);
          background-size:540px 460px,400px 420px,620px 560px;opacity:0.3;"></div>

        <div style="position:absolute;left:0;right:0;bottom:0;height:240px;background:#0B1426;"></div>
        <div style="position:absolute;left:0;right:0;bottom:230px;height:2px;background:#4FC3F7;opacity:0.25;"></div>
        <svg style="position:absolute;left:0;right:0;bottom:0;pointer-events:none;" width="1920" height="240" viewBox="0 0 1920 240">
          <g stroke="#4FC3F7" stroke-width="1" opacity="0.12">
            <line x1="0" y1="30" x2="1920" y2="30"/>
            <line x1="0" y1="70" x2="1920" y2="70"/>
            <line x1="0" y1="110" x2="1920" y2="110"/>
            <line x1="0" y1="150" x2="1920" y2="150"/>
            <line x1="0" y1="190" x2="1920" y2="190"/>
          </g>
          <g stroke="#FFD166" stroke-width="1.5" opacity="0.28">
            <line x1="820" y1="20" x2="1100" y2="20"/>
            <line x1="760" y1="60" x2="1160" y2="60"/>
            <line x1="720" y1="100" x2="1200" y2="100"/>
            <line x1="680" y1="140" x2="1240" y2="140"/>
          </g>
        </svg>

        <div style="position:absolute;left:880px;bottom:200px;width:160px;height:160px;border-radius:50%;
                    background:radial-gradient(circle at 50% 50%, #FFD166 0%, rgba(255,209,102,0.4) 70%, rgba(255,209,102,0) 100%);
                    filter:blur(2px);"></div>

        <svg id="s7-orion-wrap" viewBox="0 0 600 640" width="600" height="640"
             style="position:absolute;left:660px;top:140px;">
          <g id="s7-chutes">
            <g transform="translate(180 70)">
              <path d="M 0 100 Q 50 -20 100 100 Z" fill="#E8EEF7"/>
              <path d="M 0 100 Q 50 -20 100 100 Z" fill="none" stroke="#0B1426" stroke-width="1"/>
              <line x1="16" y1="92" x2="14" y2="80" stroke="#FF6B35" stroke-width="2"/>
              <line x1="50" y1="76" x2="50" y2="64" stroke="#FF6B35" stroke-width="2"/>
              <line x1="84" y1="92" x2="86" y2="80" stroke="#FF6B35" stroke-width="2"/>
              <path d="M 20 96 Q 50 64 80 96" fill="none" stroke="#FF6B35" stroke-width="6"/>
              <line x1="10" y1="100" x2="116" y2="320" stroke="#E8EEF7" stroke-width="1" opacity="0.5"/>
              <line x1="50" y1="100" x2="126" y2="320" stroke="#E8EEF7" stroke-width="1" opacity="0.5"/>
              <line x1="90" y1="100" x2="136" y2="320" stroke="#E8EEF7" stroke-width="1" opacity="0.5"/>
            </g>
            <g transform="translate(260 40)">
              <path d="M 0 100 Q 50 -20 100 100 Z" fill="#E8EEF7"/>
              <path d="M 0 100 Q 50 -20 100 100 Z" fill="none" stroke="#0B1426" stroke-width="1"/>
              <path d="M 20 96 Q 50 64 80 96" fill="none" stroke="#FF6B35" stroke-width="6"/>
              <line x1="50" y1="100" x2="76" y2="350" stroke="#E8EEF7" stroke-width="1" opacity="0.5"/>
            </g>
            <g transform="translate(340 70)">
              <path d="M 0 100 Q 50 -20 100 100 Z" fill="#E8EEF7"/>
              <path d="M 0 100 Q 50 -20 100 100 Z" fill="none" stroke="#0B1426" stroke-width="1"/>
              <path d="M 20 96 Q 50 64 80 96" fill="none" stroke="#FF6B35" stroke-width="6"/>
              <line x1="10" y1="100" x2="-56" y2="320" stroke="#E8EEF7" stroke-width="1" opacity="0.5"/>
              <line x1="50" y1="100" x2="-46" y2="320" stroke="#E8EEF7" stroke-width="1" opacity="0.5"/>
              <line x1="90" y1="100" x2="-36" y2="320" stroke="#E8EEF7" stroke-width="1" opacity="0.5"/>
            </g>
          </g>
          <g id="s7-capsule" transform="translate(240 380)">
            <path d="M 0 40 L 20 -40 L 100 -40 L 120 40 L 110 70 L 10 70 Z" fill="#E8EEF7"/>
            <path d="M 0 40 L 20 -40 L 100 -40 L 120 40 L 110 70 L 10 70 Z" fill="none" stroke="#0B1426" stroke-width="1.5"/>
            <path d="M 0 40 L 10 70 L 110 70 L 120 40 Z" fill="#2a1810" opacity="0.8"/>
            <rect x="30" y="-20" width="60" height="3" fill="#4FC3F7" opacity="0.6"/>
            <rect x="30" y="-10" width="60" height="3" fill="#4FC3F7" opacity="0.6"/>
            <circle cx="40" cy="8" r="4" fill="#0B1426"/>
            <circle cx="80" cy="8" r="4" fill="#0B1426"/>
          </g>
        </svg>

        <div id="s7-stats"
             style="position:absolute;left:80px;top:120px;width:560px;opacity:0;">
          <div style="font-family:'JetBrains Mono',monospace;font-size:14px;letter-spacing:0.3em;color:#FF6B35;">
            MISSION PROFILE
          </div>
          <div style="margin-top:16px;display:grid;grid-template-columns:1fr 1fr;gap:22px 28px;">
            <div>
              <div style="font-family:'JetBrains Mono',monospace;font-weight:700;font-size:62px;color:#E8EEF7;line-height:1;font-variant-numeric:tabular-nums;">10</div>
              <div style="margin-top:4px;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.25em;color:#E8EEF7;opacity:0.6;">DAYS</div>
            </div>
            <div>
              <div style="font-family:'JetBrains Mono',monospace;font-weight:700;font-size:62px;color:#FFD166;line-height:1;font-variant-numeric:tabular-nums;">1</div>
              <div style="margin-top:4px;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.25em;color:#E8EEF7;opacity:0.6;">FLYBY</div>
            </div>
            <div>
              <div style="font-family:'JetBrains Mono',monospace;font-weight:700;font-size:62px;color:#4FC3F7;line-height:1;font-variant-numeric:tabular-nums;">4</div>
              <div style="margin-top:4px;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.25em;color:#E8EEF7;opacity:0.6;">ASTRONAUTS</div>
            </div>
            <div>
              <div style="font-family:'JetBrains Mono',monospace;font-weight:700;font-size:62px;color:#FF6B35;line-height:1;">∞</div>
              <div style="margin-top:4px;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.25em;color:#E8EEF7;opacity:0.6;">AMBITION</div>
            </div>
          </div>
        </div>

        <div id="s7-title"
             style="position:absolute;left:0;right:0;bottom:340px;text-align:center;
                    font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:62px;
                    letter-spacing:-0.005em;color:#E8EEF7;opacity:0;line-height:1.1;">
          APR 11 2026 · PACIFIC OCEAN
        </div>
        <div id="s7-subtitle"
             style="position:absolute;left:0;right:0;bottom:270px;text-align:center;
                    font-family:'JetBrains Mono',monospace;font-size:22px;letter-spacing:0.5em;
                    color:#FF6B35;opacity:0;">
          MISSION COMPLETE
        </div>

        <div id="s7-fade" style="position:absolute;inset:0;background:#05070D;opacity:0;pointer-events:none;"></div>

        <div id="s7-next-label"
             style="position:absolute;left:0;right:0;top:440px;text-align:center;
                    font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:0.5em;
                    color:#4FC3F7;opacity:0;">
          NEXT
        </div>
        <div id="s7-next"
             style="position:absolute;left:0;right:0;top:478px;text-align:center;
                    font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:96px;
                    letter-spacing:-0.01em;color:#E8EEF7;opacity:0;line-height:1;">
          ARTEMIS III
        </div>
        <div id="s7-next-sub"
             style="position:absolute;left:0;right:0;top:590px;text-align:center;
                    font-family:'Space Grotesk',sans-serif;font-size:32px;font-weight:400;
                    letter-spacing:0.02em;color:#FFD166;opacity:0;">
          Boots on the Moon.
        </div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });
      var S = 48.4;

      tl.to("#s7-content", { opacity: 1, duration: 0.6, ease: "power2.out" }, S);

      tl.fromTo("#s7-orion-wrap",
        { y: -70 },
        { y: 40, duration: 10.0, ease: "power1.inOut" }, S);
      tl.fromTo("#s7-chutes",
        { rotation: -1.5, transformOrigin: "50% 0%" },
        { rotation: 1.5, duration: 4.0, ease: "sine.inOut" }, S);
      tl.to("#s7-chutes",
        { rotation: -1.5, duration: 4.0, ease: "sine.inOut", overwrite: "auto" }, S + 4.0);

      tl.fromTo("#s7-stats",
        { opacity: 0, y: 18 },
        { opacity: 1, y: 0, duration: 1.0, ease: "expo.out" }, S + 0.6);

      tl.fromTo("#s7-title",
        { opacity: 0, y: 16, letterSpacing: "0.05em" },
        { opacity: 1, y: 0, letterSpacing: "-0.005em", duration: 1.1, ease: "expo.out" }, S + 2.0);
      tl.fromTo("#s7-subtitle",
        { opacity: 0, y: 8 },
        { opacity: 1, y: 0, duration: 0.9, ease: "power3.out" }, S + 2.4);

      tl.to("#s7-fade", { opacity: 1, duration: 1.2, ease: "power2.inOut" }, S + 6.0);

      tl.fromTo("#s7-next-label",
        { opacity: 0, y: 8 },
        { opacity: 0.8, y: 0, duration: 0.7, ease: "power3.out" }, S + 7.4);
      tl.fromTo("#s7-next",
        { opacity: 0, y: 24, letterSpacing: "0.08em" },
        { opacity: 1, y: 0, letterSpacing: "-0.01em", duration: 1.2, ease: "expo.out" }, S + 7.6);
      tl.fromTo("#s7-next-sub",
        { opacity: 0, y: 12 },
        { opacity: 1, y: 0, duration: 0.9, ease: "power3.out" }, S + 8.2);

      tl.to("#s7-next-label", { opacity: 0, duration: 1.0, ease: "power2.in", overwrite: "auto" }, S + 10.4);
      tl.to("#s7-next", { opacity: 0, duration: 1.0, ease: "power2.in", overwrite: "auto" }, S + 10.4);
      tl.to("#s7-next-sub", { opacity: 0, duration: 1.0, ease: "power2.in", overwrite: "auto" }, S + 10.4);
      // s7-fade already at opacity 1 from earlier tween — no need to re-tween

      tl.fromTo("#s7-stars", { x: 0 }, { x: -8, duration: 11.6, ease: "none" }, S);

      tl.set({}, {}, 60);

      window.__timelines["scene-7"] = tl;
    </script>
  </body>
</html>
