<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1920px; height: 1080px; overflow: hidden; background: transparent; }
    </style>
  </head>
  <body>
    <div
      id="scene-5-root"
      data-composition-id="scene-5"
      data-start="0"
      data-duration="60"
      data-width="1920"
      data-height="1080"
      style="width:1920px;height:1080px;position:relative;overflow:hidden;background:transparent;font-family:'Space Grotesk',sans-serif;color:#E8EEF7;"
    >
      <div id="s5-content" style="position:absolute;inset:0;opacity:0;background:#05070D;">
        <div id="s5-stars-far" style="position:absolute;inset:0;background:
          radial-gradient(circle at 8% 18%, #E8EEF7 0.7px, rgba(232,238,247,0) 1.1px),
          radial-gradient(circle at 88% 12%, #E8EEF7 0.6px, rgba(232,238,247,0) 1.0px),
          radial-gradient(circle at 22% 78%, #E8EEF7 0.6px, rgba(232,238,247,0) 1.0px),
          radial-gradient(circle at 72% 82%, #E8EEF7 0.5px, rgba(232,238,247,0) 0.9px),
          radial-gradient(circle at 44% 44%, #E8EEF7 0.5px, rgba(232,238,247,0) 0.9px);
          background-size:520px 460px,380px 400px,600px 540px,440px 480px,700px 620px;opacity:0.55;"></div>
        <div id="s5-stars-mid" style="position:absolute;inset:0;background:
          radial-gradient(circle at 32% 62%, #E8EEF7 1.1px, rgba(232,238,247,0) 1.7px),
          radial-gradient(circle at 82% 44%, #E8EEF7 1.1px, rgba(232,238,247,0) 1.7px);
          background-size:760px 640px,920px 720px;opacity:0.75;"></div>

        <div id="s5-moon-wrap" style="position:absolute;left:430px;top:20px;width:1040px;height:1040px;">
          <div id="s5-moon" style="position:absolute;inset:0;border-radius:50%;
               background:
                 radial-gradient(circle at 32% 32%, #FFD166 0%, rgba(255,209,102,0.9) 35%, rgba(180,140,70,0.55) 70%, rgba(90,70,35,0.15) 100%);
               box-shadow:
                 inset -140px -60px 220px rgba(5,7,13,0.85),
                 inset 80px 40px 120px rgba(255,209,102,0.12);"></div>

          <svg viewBox="0 0 1040 1040" width="1040" height="1040" style="position:absolute;inset:0;">
            <defs>
              <clipPath id="s5-moon-clip">
                <circle cx="520" cy="520" r="516"/>
              </clipPath>
            </defs>
            <g clip-path="url(#s5-moon-clip)">
              <g fill="none" stroke="#5a4422" stroke-width="1.5" opacity="0.55">
                <circle cx="380" cy="380" r="52"/>
                <circle cx="620" cy="420" r="74"/>
                <circle cx="300" cy="580" r="40"/>
                <circle cx="720" cy="620" r="60"/>
                <circle cx="540" cy="260" r="34"/>
                <circle cx="460" cy="660" r="46"/>
                <circle cx="660" cy="780" r="36"/>
                <circle cx="840" cy="460" r="28"/>
                <circle cx="220" cy="440" r="24"/>
                <circle cx="400" cy="780" r="50"/>
                <circle cx="820" cy="680" r="38"/>
                <circle cx="260" cy="260" r="18"/>
                <circle cx="500" cy="520" r="90"/>
                <circle cx="720" cy="300" r="22"/>
              </g>
              <g fill="#5a4422" opacity="0.15">
                <circle cx="380" cy="380" r="52"/>
                <circle cx="620" cy="420" r="74"/>
                <circle cx="720" cy="620" r="60"/>
                <circle cx="500" cy="520" r="90"/>
                <circle cx="400" cy="780" r="50"/>
              </g>
              <g fill="none" stroke="#E8EEF7" stroke-width="0.5" opacity="0.08">
                <circle cx="380" cy="380" r="52"/>
                <circle cx="620" cy="420" r="74"/>
                <circle cx="500" cy="520" r="90"/>
              </g>
            </g>
          </svg>
        </div>

        <svg style="position:absolute;inset:0;pointer-events:none;" width="1920" height="1080" viewBox="0 0 1920 1080">
          <path id="s5-traj-front"
                d="M -60 540 Q 300 340, 720 320"
                fill="none" stroke="#4FC3F7" stroke-width="3"
                stroke-dasharray="900" stroke-dashoffset="900"
                stroke-linecap="round"/>
          <path id="s5-traj-back"
                d="M 1260 320 Q 1500 440, 1980 620"
                fill="none" stroke="#4FC3F7" stroke-width="3"
                stroke-dasharray="700" stroke-dashoffset="700"
                stroke-linecap="round" opacity="0.55"/>
          <g id="s5-ca-marker" transform="translate(960 280)" opacity="0">
            <circle r="32" fill="none" stroke="#FF6B35" stroke-width="1.5" opacity="0.6"/>
            <circle r="20" fill="none" stroke="#FF6B35" stroke-width="2"/>
            <circle r="5" fill="#FF6B35"/>
          </g>
        </svg>

        <div style="position:absolute;left:80px;top:80px;
                    font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:0.35em;color:#4FC3F7;">
          PHASE 04 · HERO MOMENT
        </div>
        <div id="s5-heading"
             style="position:absolute;left:80px;top:110px;
                    font-family:'Space Grotesk',sans-serif;font-size:44px;font-weight:600;color:#E8EEF7;opacity:0;">
          Lunar Flyby
        </div>
        <div id="s5-rule"
             style="position:absolute;left:80px;top:180px;width:0;height:2px;background:#FF6B35;"></div>

        <div id="s5-ca"
             style="position:absolute;left:80px;top:260px;width:480px;opacity:0;">
          <div style="font-family:'JetBrains Mono',monospace;font-size:14px;letter-spacing:0.3em;color:#FF6B35;">
            CLOSEST APPROACH
          </div>
          <div style="margin-top:12px;font-family:'JetBrains Mono',monospace;font-size:22px;letter-spacing:0.2em;color:#E8EEF7;opacity:0.8;">
            APR 06 2026 · 16:04 UTC
          </div>
          <div style="margin-top:14px;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:100px;letter-spacing:-0.01em;color:#FFD166;font-variant-numeric:tabular-nums;line-height:1;">
            <span id="s5-ca-km">6,545</span>
            <span style="font-size:36px;color:#E8EEF7;opacity:0.7;"> KM</span>
          </div>
          <div style="margin-top:6px;font-family:'JetBrains Mono',monospace;font-size:14px;letter-spacing:0.2em;color:#E8EEF7;opacity:0.6;">
            ABOVE LUNAR FAR SIDE
          </div>
        </div>

        <div id="s5-far"
             style="position:absolute;left:80px;top:590px;width:480px;opacity:0;">
          <div style="font-family:'JetBrains Mono',monospace;font-size:14px;letter-spacing:0.3em;color:#4FC3F7;">
            DISTANCE FROM EARTH
          </div>
          <div style="margin-top:10px;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:56px;color:#E8EEF7;font-variant-numeric:tabular-nums;">
            <span id="s5-far-km">406,771</span>
            <span style="font-size:24px;opacity:0.7;"> KM</span>
          </div>
          <div style="margin-top:8px;font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:500;color:#E8EEF7;opacity:0.85;line-height:1.3;">
            Farthest humans have<br/>ever traveled.
          </div>
        </div>

        <div id="s5-crew"
             style="position:absolute;right:80px;top:260px;width:500px;opacity:0;text-align:right;">
          <div style="font-family:'JetBrains Mono',monospace;font-size:14px;letter-spacing:0.3em;color:#4FC3F7;">
            CREW · ARTEMIS II
          </div>
          <div style="margin-top:20px;display:flex;flex-direction:column;gap:10px;">
            <div class="s5-crew-row" style="font-family:'Space Grotesk',sans-serif;font-size:34px;font-weight:500;color:#E8EEF7;letter-spacing:-0.005em;"><span style="font-family:'JetBrains Mono',monospace;font-size:14px;color:#FFD166;letter-spacing:0.3em;margin-right:14px;">CDR</span>Reid Wiseman</div>
            <div class="s5-crew-row" style="font-family:'Space Grotesk',sans-serif;font-size:34px;font-weight:500;color:#E8EEF7;"><span style="font-family:'JetBrains Mono',monospace;font-size:14px;color:#FFD166;letter-spacing:0.3em;margin-right:14px;">PLT</span>Victor Glover</div>
            <div class="s5-crew-row" style="font-family:'Space Grotesk',sans-serif;font-size:34px;font-weight:500;color:#E8EEF7;"><span style="font-family:'JetBrains Mono',monospace;font-size:14px;color:#FFD166;letter-spacing:0.3em;margin-right:14px;">MS1</span>Christina Koch</div>
            <div class="s5-crew-row" style="font-family:'Space Grotesk',sans-serif;font-size:34px;font-weight:500;color:#E8EEF7;"><span style="font-family:'JetBrains Mono',monospace;font-size:14px;color:#FFD166;letter-spacing:0.3em;margin-right:14px;">MS2</span>Jeremy Hansen</div>
          </div>
        </div>

        <div id="s5-ca-label"
             style="position:absolute;left:1000px;top:170px;
                    font-family:'JetBrains Mono',monospace;font-size:14px;letter-spacing:0.25em;color:#FF6B35;opacity:0;">
          ⟶ CLOSEST APPROACH
        </div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });
      var S = 30.4;

      tl.to("#s5-content", { opacity: 1, duration: 0.6, ease: "power2.out" }, S);

      tl.fromTo("#s5-heading",
        { opacity: 0, y: 14 },
        { opacity: 1, y: 0, duration: 0.9, ease: "expo.out" }, S + 0.4);
      tl.to("#s5-rule", { width: 160, duration: 0.8, ease: "expo.out" }, S + 0.8);

      tl.fromTo("#s5-moon-wrap",
        { scale: 0.94, x: 40 },
        { scale: 1.0, x: 0, duration: 10.6, ease: "power2.inOut", transformOrigin: "50% 50%" }, S);

      tl.to("#s5-traj-front",
        { attr: { "stroke-dashoffset": 0 }, duration: 2.4, ease: "power2.out" }, S + 1.0);
      tl.to("#s5-traj-back",
        { attr: { "stroke-dashoffset": 0 }, duration: 2.2, ease: "power2.out" }, S + 2.9);

      tl.fromTo("#s5-ca-marker",
        { opacity: 0, scale: 0.5, transformOrigin: "50% 50%" },
        { opacity: 1, scale: 1, duration: 0.7, ease: "expo.out" }, S + 3.2);
      tl.to("#s5-ca-marker > circle:first-child",
        { attr: { r: 52 }, opacity: 0, duration: 1.2, ease: "power2.out", overwrite: "auto" }, S + 3.4);
      tl.set("#s5-ca-marker > circle:first-child", { attr: { r: 32 }, opacity: 0.6 }, S + 4.6);
      tl.to("#s5-ca-marker > circle:first-child",
        { attr: { r: 52 }, opacity: 0, duration: 1.2, ease: "power2.out", overwrite: "auto" }, S + 4.6);
      tl.set("#s5-ca-marker > circle:first-child", { attr: { r: 32 }, opacity: 0.6 }, S + 5.8);
      tl.to("#s5-ca-marker > circle:first-child",
        { attr: { r: 52 }, opacity: 0, duration: 1.2, ease: "power2.out", overwrite: "auto" }, S + 5.8);
      tl.set("#s5-ca-marker > circle:first-child", { attr: { r: 32 }, opacity: 0.6 }, S + 7.0);

      tl.fromTo("#s5-ca",
        { opacity: 0, x: -16 },
        { opacity: 1, x: 0, duration: 1.0, ease: "expo.out" }, S + 3.6);
      tl.fromTo("#s5-ca-label",
        { opacity: 0, x: -8 },
        { opacity: 1, x: 0, duration: 0.6, ease: "power3.out" }, S + 3.4);

      var ca = { v: 8200 };
      tl.to(ca, {
        v: 6545,
        duration: 1.2,
        ease: "power3.out",
        onUpdate: function () {
          var el = document.getElementById("s5-ca-km");
          if (el) el.textContent = Math.round(ca.v).toLocaleString("en-US");
        }
      }, S + 3.6);

      tl.fromTo("#s5-far",
        { opacity: 0, x: -16 },
        { opacity: 1, x: 0, duration: 1.0, ease: "expo.out" }, S + 5.0);
      var farK = { v: 402000 };
      tl.to(farK, {
        v: 406771,
        duration: 1.8,
        ease: "power2.out",
        onUpdate: function () {
          var el = document.getElementById("s5-far-km");
          if (el) el.textContent = Math.round(farK.v).toLocaleString("en-US");
        }
      }, S + 5.0);

      tl.fromTo("#s5-crew",
        { opacity: 0, x: 16 },
        { opacity: 1, x: 0, duration: 1.0, ease: "expo.out" }, S + 6.4);
      tl.fromTo(".s5-crew-row",
        { opacity: 0, y: 10 },
        { opacity: 1, y: 0, duration: 0.5, stagger: 0.12, ease: "power3.out" }, S + 6.6);

      tl.fromTo("#s5-stars-far", { x: 0 }, { x: -18, duration: 10.6, ease: "none" }, S);
      tl.fromTo("#s5-stars-mid", { x: 0 }, { x: -36, duration: 10.6, ease: "none" }, S);

      tl.set({}, {}, 60);

      window.__timelines["scene-5"] = tl;
    </script>
  </body>
</html>
