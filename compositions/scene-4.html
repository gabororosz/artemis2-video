<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1920px; height: 1080px; overflow: hidden; background: transparent; }
    </style>
  </head>
  <body>
    <div
      id="scene-4-root"
      data-composition-id="scene-4"
      data-start="0"
      data-duration="60"
      data-width="1920"
      data-height="1080"
      style="width:1920px;height:1080px;position:relative;overflow:hidden;background:transparent;font-family:'Space Grotesk',sans-serif;color:#E8EEF7;"
    >
      <div id="s4-content" style="position:absolute;inset:0;opacity:0;background:#05070D;">
        <div id="s4-stars-far" style="position:absolute;inset:0;background:
          radial-gradient(circle at 14% 24%, #E8EEF7 0.7px, rgba(232,238,247,0) 1.1px),
          radial-gradient(circle at 78% 16%, #E8EEF7 0.6px, rgba(232,238,247,0) 1.0px),
          radial-gradient(circle at 52% 74%, #E8EEF7 0.6px, rgba(232,238,247,0) 1.0px);
          background-size:480px 440px,360px 380px,600px 520px;opacity:0.55;"></div>

        <svg style="position:absolute;left:-60px;bottom:-60px;" width="440" height="440" viewBox="0 0 440 440">
          <defs>
            <radialGradient id="s4-eg" cx="35%" cy="35%" r="75%">
              <stop offset="0%" stop-color="#4FC3F7" stop-opacity="0.75"/>
              <stop offset="70%" stop-color="#0B1426" stop-opacity="0.9"/>
              <stop offset="100%" stop-color="#05070D" stop-opacity="1"/>
            </radialGradient>
          </defs>
          <circle cx="180" cy="260" r="220" fill="url(#s4-eg)"/>
          <circle cx="180" cy="260" r="220" fill="none" stroke="#4FC3F7" stroke-width="1" opacity="0.3"/>
        </svg>

        <div style="position:absolute;left:80px;top:80px;
                    font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:0.35em;color:#4FC3F7;">
          PHASE 03
        </div>
        <div id="s4-heading"
             style="position:absolute;left:80px;top:110px;
                    font-family:'Space Grotesk',sans-serif;font-size:44px;font-weight:600;color:#E8EEF7;opacity:0;">
          Outbound Coast · 4 Days
        </div>
        <div id="s4-rule"
             style="position:absolute;left:80px;top:180px;width:0;height:2px;background:#FF6B35;"></div>

        <svg id="s4-orion-svg" viewBox="0 0 520 320" width="520" height="320"
             style="position:absolute;left:960px;top:420px;">
          <g fill="none" stroke="#E8EEF7" stroke-width="1.5" opacity="0.75">
            <polygon points="60,160 220,70 300,70 340,100 340,220 300,250 220,250 60,160"/>
            <rect x="300" y="90" width="160" height="140" rx="6"/>
            <rect x="460" y="54" width="50" height="88" stroke="#4FC3F7"/>
            <line x1="460" y1="68" x2="510" y2="68" stroke="#4FC3F7"/>
            <line x1="460" y1="82" x2="510" y2="82" stroke="#4FC3F7"/>
            <line x1="460" y1="96" x2="510" y2="96" stroke="#4FC3F7"/>
            <line x1="460" y1="110" x2="510" y2="110" stroke="#4FC3F7"/>
            <line x1="460" y1="124" x2="510" y2="124" stroke="#4FC3F7"/>
            <rect x="460" y="178" width="50" height="88" stroke="#4FC3F7"/>
            <line x1="460" y1="192" x2="510" y2="192" stroke="#4FC3F7"/>
            <line x1="460" y1="206" x2="510" y2="206" stroke="#4FC3F7"/>
            <line x1="460" y1="220" x2="510" y2="220" stroke="#4FC3F7"/>
            <line x1="460" y1="234" x2="510" y2="234" stroke="#4FC3F7"/>
            <line x1="460" y1="248" x2="510" y2="248" stroke="#4FC3F7"/>
            <line x1="220" y1="70" x2="220" y2="250"/>
            <line x1="250" y1="78" x2="250" y2="242"/>
            <line x1="100" y1="145" x2="300" y2="145"/>
            <line x1="100" y1="175" x2="300" y2="175"/>
          </g>
          <g stroke="#4FC3F7" stroke-width="1" opacity="0.35">
            <circle cx="200" cy="160" r="8" fill="none"/>
            <line x1="182" y1="160" x2="192" y2="160"/>
            <line x1="208" y1="160" x2="218" y2="160"/>
            <line x1="200" y1="142" x2="200" y2="152"/>
            <line x1="200" y1="168" x2="200" y2="178"/>
          </g>
          <text x="200" y="300" text-anchor="middle" font-family="JetBrains Mono" font-size="11" letter-spacing="4" fill="#4FC3F7" opacity="0.7">ORION · CSM</text>
        </svg>

        <div style="position:absolute;left:80px;top:360px;width:820px;font-family:'JetBrains Mono',monospace;">
          <div style="display:flex;justify-content:space-between;font-size:14px;letter-spacing:0.3em;color:#E8EEF7;opacity:0.7;">
            <span>EARTH</span>
            <span>MOON</span>
          </div>
          <div style="margin-top:14px;height:6px;background:rgba(232,238,247,0.1);position:relative;border-radius:3px;overflow:hidden;">
            <div id="s4-progress" style="position:absolute;left:0;top:0;height:100%;width:0%;background:#4FC3F7;"></div>
            <div id="s4-progress-glow" style="position:absolute;left:0;top:-4px;height:14px;width:0%;background:rgba(79,195,247,0.25);filter:blur(4px);"></div>
          </div>
          <div style="margin-top:10px;display:flex;justify-content:space-between;font-size:12px;letter-spacing:0.2em;color:#E8EEF7;opacity:0.55;">
            <span>T+01D</span>
            <span id="s4-day">DAY 1</span>
            <span>T+05D</span>
          </div>
        </div>

        <div style="position:absolute;left:80px;top:500px;">
          <div style="font-family:'JetBrains Mono',monospace;font-size:14px;letter-spacing:0.3em;color:#4FC3F7;opacity:0.75;">
            DISTANCE TO MOON
          </div>
          <div id="s4-dist" style="margin-top:10px;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:100px;letter-spacing:-0.01em;color:#E8EEF7;font-variant-numeric:tabular-nums;">
            384,000 <span style="font-size:42px;color:#E8EEF7;opacity:0.6;">KM</span>
          </div>
          <div style="margin-top:4px;font-family:'JetBrains Mono',monospace;font-size:14px;letter-spacing:0.2em;color:#E8EEF7;opacity:0.55;">
            COUNTING DOWN TO CLOSEST APPROACH
          </div>
        </div>

        <div style="position:absolute;left:80px;bottom:90px;right:80px;
                    display:flex;justify-content:space-between;
                    font-family:'JetBrains Mono',monospace;font-size:14px;letter-spacing:0.25em;color:#E8EEF7;opacity:0.7;">
          <div><span style="color:#FFD166;">◆</span>&nbsp;&nbsp;CRUISE · PASSIVE THERMAL CONTROL</div>
          <div>HEADING 180° · 11,000 KM/H</div>
          <div>LIFE SUPPORT NOMINAL</div>
        </div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });
      var S = 23.4;

      tl.to("#s4-content", { opacity: 1, duration: 0.6, ease: "power2.out" }, S);

      tl.fromTo("#s4-heading",
        { opacity: 0, y: 14 },
        { opacity: 1, y: 0, duration: 0.9, ease: "expo.out" }, S + 0.4);
      tl.to("#s4-rule", { width: 180, duration: 0.8, ease: "expo.out" }, S + 0.8);

      tl.to("#s4-progress", { width: "100%", duration: 5.4, ease: "power2.inOut" }, S + 1.0);
      tl.to("#s4-progress-glow", { width: "100%", duration: 5.4, ease: "power2.inOut" }, S + 1.0);

      var day = { v: 1 };
      tl.to(day, {
        v: 5,
        duration: 5.4,
        ease: "power2.inOut",
        onUpdate: function () {
          var el = document.getElementById("s4-day");
          if (el) el.textContent = "DAY " + Math.max(1, Math.round(day.v));
        }
      }, S + 1.0);

      var dist = { v: 384000 };
      tl.to(dist, {
        v: 6545,
        duration: 5.6,
        ease: "power2.inOut",
        onUpdate: function () {
          var el = document.getElementById("s4-dist");
          if (!el) return;
          var n = Math.round(dist.v);
          var s = n.toLocaleString("en-US");
          el.innerHTML = s + ' <span style="font-size:42px;color:#E8EEF7;opacity:0.6;">KM</span>';
        }
      }, S + 1.0);

      tl.fromTo("#s4-orion-svg",
        { x: 40 }, { x: -40, duration: 7.6, ease: "power1.inOut" }, S);

      tl.fromTo("#s4-stars-far", { x: 0 }, { x: -18, duration: 7.6, ease: "none" }, S);

      tl.set({}, {}, 60);

      window.__timelines["scene-4"] = tl;
    </script>
  </body>
</html>
